<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Grupo</title>
  <link rel="stylesheet" href="../CSS/styles.css">
</head>
<body class="home-page">

<div class="home-shell">
  <div id="navbar-container"></div>

  <main class="home-main">
  <div class="card">

    <a class="btn btn-ghost" href="chats.html">Volver a chats</a>

    <h2 id="chatTitle">Grupo</h2>
    
    <div style="margin: 10px 0; display: flex; gap: 10px; align-items: center;">
      <label>
        <input type="checkbox" id="encryptionToggle" style="cursor: pointer;">
        Encriptación
      </label>
      <span id="encryptionStatus" style="font-size: 12px; color: #666;"></span>
    </div>
    
    <div class="footer-actions">
      <input id="groupNameInput" type="text" placeholder="Nuevo nombre del grupo">
      <button id="btnRenameGroup">Guardar nombre</button>
    </div>
    <p class="small" id="groupNameStatus"></p>

    <div class="chatbox" id="chatBox">
      <div class="msg other">
        <span>Cargando historial...</span>
      </div>
    </div>

    <div class="footer-actions">
      <input id="groupChatInput" type="text" placeholder="Escribe un mensaje...">
      <button id="btnSendGroupMessage">Enviar</button>
      <button id="btnSendGroupLocation" type="button" title="Compartir ubicación"><img src="../Images/poi.png" alt="Ubicación" style="width:20px;height:20px;"></button>
      <a class="btn-secondary btn btn-vertareas" href="javascript:void(0)" onclick="goToGroupTasks()" >Ver tareas</a>
    </div>

    <div class="footer-actions">
      <input id="groupFileInput" type="file" accept="image/*,video/*">
    </div>

  </div>
  </main>
</div>

<script src="../JS/navbar.js"></script>
<script src="../JS/app.js"></script>
<script src="https://cdn.socket.io/4.8.0/socket.io.min.js"></script>
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyASvgpTvcKC3A8FvzPWNfv6d24gzPrhzB4&loading=async"></script>
<script src="../JS/encryption.js"></script>
<script src="../JS/chat_group.js"></script>

</body>
</html>
