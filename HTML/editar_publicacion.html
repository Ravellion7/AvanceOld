<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Editar publicación</title>
  <link rel="stylesheet" href="../CSS/styles.css">
</head>
<body class="home-page">

<div class="home-shell">
  <div id="navbar-container"></div>

  <main class="home-main">
    <div class="card">
      <a class="btn btn-ghost" href="perfil.html">← Volver a perfil</a>

      <h2 class="post-page-title">Editar publicación</h2>
      <p class="post-page-subtitle">Ajusta el texto, reemplaza la multimedia o quítala por completo antes de guardar.</p>
    </div>

    <div class="post-editor-grid">
      <section class="card post-editor-panel">
        <h3>Editar contenido</h3>

        <label for="txtEdit">Texto</label>
        <textarea id="txtEdit" placeholder="Escribe el nuevo texto de tu publicación..."></textarea>

        <div>
          <label for="imgEdit">Cambiar imagen o video</label>
          <input id="imgEdit" type="file" accept="image/*,video/*">
          <div class="post-editor-media-note">Puedes reemplazar la multimedia actual con un nuevo archivo.</div>
        </div>

        <div class="post-editor-file-actions">
          <button id="btnRemoveMedia" type="button" class="btn btn-secondary">Quitar imagen/video</button>
          <button id="btnRestoreMedia" type="button" class="btn btn-ghost">Restaurar multimedia original</button>
        </div>

        <div class="post-editor-actions">
          <button id="btnSave" type="button">Guardar cambios</button>
          <a id="btnCancel" class="btn btn-ghost" href="perfil.html">Cancelar</a>
        </div>

        <p id="msg" class="small"></p>
      </section>

      <section class="card post-editor-panel post-editor-preview">
        <h3>Vista previa</h3>

        <div class="item post-item">
          <div class="user-info">
            <img class="avatar" id="previewAvatar" alt="avatar">
            <div>
              <strong id="previewName">Tu publicación</strong>
              <div class="small" id="previewMeta">Vista previa</div>
            </div>
          </div>

          <p id="previewText" class="post-content"></p>

          <div id="previewMediaEmpty" class="small">Sin multimedia adjunta.</div>
          <img id="previewImg" class="post-img post-preview-media" alt="Vista previa de imagen" style="display:none;">
          <video id="previewVideo" class="post-media-video post-preview-media" controls style="display:none;"></video>
        </div>
      </section>
    </div>
  </main>
</div>

<script src="../JS/navbar.js"></script>
<script src="../JS/app.js"></script>
<script src="../JS/editar_publicacion.js"></script>

</body>
</html>
