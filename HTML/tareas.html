<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tareas</title>
  <link rel="stylesheet" href="../CSS/styles.css">
</head>
<body class="home-page">

<div class="home-shell">
  <div id="navbar-container"></div>

  <main class="home-main">
    <div class="card">
      <h2>Tareas</h2>
      <a id="btnBackToChats" class="btn btn-ghost" href="chats.html" style="display:none;">Volver a chats</a>
      <p class="small" id="tasksDesc">Selecciona un grupo para ver sus tareas.</p>
    </div>

    <!-- Pantalla de selección de grupos -->
    <div id="groupsSection" style="display:none;">
      <div class="card">
        <h3>Mis grupos</h3>
        <div class="list" id="groupsList"></div>
      </div>
    </div>

    <!-- Pantalla de tareas del grupo -->
    <div id="tasksSection" style="display:none;">
      <div class="card">
        <h3 id="groupTitle">Tareas del grupo</h3>
        
        <div style="display:flex; flex-direction:column; gap:8px; margin-bottom:16px;">
          <input id="taskTitleInput" type="text" placeholder="Nombre de la tarea" style="font-weight:bold;">
          <textarea id="taskDescInput" placeholder="Descripción (opcional)" rows="2" style="resize:vertical;"></textarea>
          <input id="taskLocationInput" type="text" placeholder="Ubicación o link (opcional)">
          <div style="display:flex; gap:8px; justify-content:center;">
            <button id="btnAddTask" style="width:auto; flex-shrink:0;">Agregar tarea</button>
          </div>
        </div>

        <div id="tasksList" class="list"></div>
      </div>
    </div>
  </main>
</div>

<script src="../JS/navbar.js"></script>
<script src="../JS/app.js"></script>
<script src="../JS/tareas.js"></script>
</body>
</html>
