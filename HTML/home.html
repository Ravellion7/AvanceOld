<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Inicio</title>
  <link rel="stylesheet" href="../CSS/styles.css">
</head>
<body class="home-page">

<div class="home-shell">
  <div id="navbar-container"></div>

  <main class="home-main">
    <div class="layout">
      <div class="feed">
        <div class="card">
          <div class="post-composer" id="postComposerBox">
            <div class="post-composer-header">
              <img class="avatar" id="postComposerAvatar" src="../Images/perfil.png" alt="Avatar del usuario">
              <div class="post-composer-user">
                <strong id="postComposerName">Usuario</strong>
              </div>
            </div>

            <div class="post-composer-body">
              <textarea id="postContentInput" maxlength="250" placeholder="¿Qué quieres compartir hoy?"></textarea>
              <div class="post-composer-counter" id="postCharCounter">0/250</div>
              <div class="post-composer-file" id="postSelectedMedia">Sin archivo adjunto</div>
            </div>

            <div class="post-composer-actions">
              <button type="button" class="btn btn-ghost" id="btnAttachMedia">Adjuntar imagen/video</button>
              <input id="postMediaInput" type="file" accept="image/*,video/*" hidden>
              <button type="button" id="btnCreatePost">Publicar</button>
            </div>
          </div>
        </div>

        <div class="card">
          <h2>Para ti</h2>
          <div class="list" id="postsFeedList">
            <div class="item small">Cargando publicaciones...</div>
          </div>
        </div>
      </div>

      <aside class="sidebar">
        <div class="onlinebar">
          <strong>Mis amigos</strong>
          <div class="list" id="friendsSidebarList">
            <div class="item small">Cargando amigos...</div>
          </div>

          <strong style="display:block; margin-top:12px;">Solicitudes pendientes</strong>
          <div class="list" id="pendingRequestsSidebarList">
            <div class="item small">Cargando solicitudes...</div>
          </div>
        </div>
      </aside>
    </div>
  </main>
</div>

<script src="../JS/navbar.js"></script>
<script src="../JS/app.js"></script>
<script src="https://cdn.socket.io/4.8.0/socket.io.min.js"></script>
<script src="../JS/home.js"></script>
</body>
</html>
