<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Perfil</title>
  <link rel="stylesheet" href="../CSS/styles.css">
</head>
<body class="home-page">

<div class="home-shell">
  <div id="navbar-container"></div>

  <main class="home-main">

  <div class="card">
    <h2>Mi perfil</h2>

    <div style="margin-top: 16px; padding: 20px; background: #f9faf7; border: 1px solid #e5eadf; border-radius: 12px;">
      <div style="display: flex; gap: 20px; align-items: flex-start;">
        <div style="flex: 0 0 120px;">
          <img id="profilePhotoPreview" class="avatar" alt="foto de perfil" style="width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 2px solid #ddd;">
          <p id="profilePhotoMsg" class="small" style="margin-top: 8px; text-align: center;"></p>
        </div>

        <div style="flex: 1;">
          <label style="display: block; margin-bottom: 8px; font-weight: 500;">Cambiar foto de perfil</label>
          <input id="profilePhotoInput" type="file" accept="image/*" style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 6px;">
          
          <div class="footer-actions" style="margin-top: 12px; gap: 8px;">
            <button id="btnSaveProfilePhoto" type="button">Guardar foto</button>
            <button id="btnCancelProfilePhoto" type="button" class="btn-secondary" style="background-color: #e5eadf; color: #333;">Cancelar</button>
          </div>
        </div>
      </div>
    </div>

  </div>

  <div class="card">
    <h3>Mis publicaciones</h3>

    <div id="userPostsList" class="list">
      <!-- Se llenarán dinámicamente aquí -->
    </div>

    <div id="noUserPosts" style="text-align: center; padding: 40px 20px; color: #999;">
      <p>No tienes publicaciones aún.</p>
    </div>

  </div>

  </main>
</div>

<script src="../JS/navbar.js"></script>
<script src="../JS/app.js"></script>
<script src="../JS/perfil.js"></script>
<script>
  initNavbar('navbar-container', 'perfil');
  requireLogin();
  renderHeaderUser();
  wireLogoutButton();
  initProfilePage();
</script>

</body>
</html>
